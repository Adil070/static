<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💖 Will You Be My Valentine? 💖</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="heartsCanvas"></canvas>
    
    <div id="passwordScreen" class="screen active">
        <h1 class="password-title">Enter Password 🔒</h1>
        <div class="password-container">
            <input type="password" id="passwordInput" placeholder="Enter your password" />
            <button id="submitPassword" class="btn submit-btn">Submit</button>
            <div id="errorMessage" class="error-message"></div>
        </div>
    </div>
    
    <div id="questionScreen" class="screen">
        <h1 class="main-question">Will you be my Valentine? ❤️</h1>
        <div class="buttons-container">
            <button id="yesBtn" class="btn yes-btn">YES 💖</button>
            <button id="noBtn" class="btn no-btn">NO 💔</button>
        </div>
        <div id="dramaticMessage" class="dramatic-message"></div>
    </div>

    <div id="celebrationScreen" class="screen">
        <div id="confettiContainer" class="confetti-container"></div>
        <div class="celebration-content">
            <div id="typewriterText" class="typewriter-text"></div>
            <div class="balloons-container" id="balloonsContainer"></div>
            <div class="panda-container">
                <div class="cute-cat">😻</div>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=" type="audio/wav">
    </audio>

    <script src="script.js"></script>
</body>
</html>
